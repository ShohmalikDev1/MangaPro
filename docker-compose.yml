services:
  db:
    image: postgres:15
    container_name: mangapro-db
    restart: always
    environment:
      POSTGRES_USER: mangapro
      POSTGRES_PASSWORD: mangapro123
      POSTGRES_DB: mangapro
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mangapro"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: mangapro-backend
    command: sh -c "npx prisma migrate deploy || true; npm run dev"
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://mangapro:mangapro123@db:5432/mangapro
      JWT_SECRET: mangapro_jwt_secret_2024
      JWT_REFRESH_SECRET: mangapro_refresh_secret_2024
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: mangapro-frontend
    command: sh -c "rm -rf .next && npm run dev"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db-data:
